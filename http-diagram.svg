<svg xmlns="http://www.w3.org/2000/svg" width="900" height="360" viewBox="0 0 900 360" role="img" aria-labelledby="title desc">
<title id="title">HTTP request and response diagram</title>
<desc id="desc">A browser sends an HTTP request to a web server, and the server returns an HTTP response.</desc>
<rect width="900" height="360" fill="#eef5ff"/>
<rect x="70" y="110" width="220" height="140" rx="16" fill="#ffffff" stroke="#183153" stroke-width="3"/>
<text x="180" y="165" text-anchor="middle" font-family="Arial" font-size="28" fill="#183153" font-weight="700">Browser</text>
<text x="180" y="198" text-anchor="middle" font-family="Arial" font-size="16" fill="#65758b">Client / user agent</text>
<rect x="610" y="110" width="220" height="140" rx="16" fill="#ffffff" stroke="#183153" stroke-width="3"/>
<text x="720" y="165" text-anchor="middle" font-family="Arial" font-size="28" fill="#183153" font-weight="700">Web Server</text>
<text x="720" y="198" text-anchor="middle" font-family="Arial" font-size="16" fill="#65758b">Hosts resources</text>
<line x1="300" y1="150" x2="595" y2="150" stroke="#2f80ed" stroke-width="6" marker-end="url(#arrow)"/>
<line x1="600" y1="215" x2="305" y2="215" stroke="#2f80ed" stroke-width="6" marker-end="url(#arrow)"/>
<text x="450" y="130" text-anchor="middle" font-family="Arial" font-size="18" fill="#183153">HTTP Request</text>
<text x="450" y="245" text-anchor="middle" font-family="Arial" font-size="18" fill="#183153">HTTP Response</text>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#2f80ed"/></marker></defs>
</svg>
