<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 360" role="img" aria-labelledby="t d"><title id="t">HTTP request and response</title><desc id="d">A browser sends an HTTP request to a web server, which returns an HTTP response.</desc><rect width="800" height="360" fill="#eef5ff"/><rect x="55" y="100" width="220" height="150" rx="18" fill="#fff" stroke="#183153" stroke-width="5"/><rect x="525" y="100" width="220" height="150" rx="18" fill="#fff" stroke="#183153" stroke-width="5"/><text x="165" y="165" text-anchor="middle" font-family="Arial" font-size="28" fill="#183153">Browser</text><text x="635" y="165" text-anchor="middle" font-family="Arial" font-size="28" fill="#183153">Web Server</text><path d="M285 135 H500" stroke="#2f80ed" stroke-width="8" marker-end="url(#a)"/><path d="M515 215 H300" stroke="#176b3a" stroke-width="8" marker-end="url(#b)"/><text x="400" y="115" text-anchor="middle" font-family="Arial" font-size="20" fill="#183153">HTTP Request</text><text x="400" y="255" text-anchor="middle" font-family="Arial" font-size="20" fill="#183153">HTTP Response</text><defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#2f80ed"/></marker><marker id="b" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#176b3a"/></marker></defs></svg>